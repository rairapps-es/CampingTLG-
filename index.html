<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampVibes Es - Tu Acampada Veraniega</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        arena: '#FAFAFA',
                        mar: '#00F2FE',
                        marDark: '#4FACFE',
                        naturaleza: '#4CAF50',
                        fomoCoral: '#FF6B6B',
                        fomoSol: '#FFA07A'
                    }
                }
            }
        }
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-header {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-modal {
            background: rgba(10, 25, 41, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        @keyframes sunArc {
            0% {
                transform: translate(-150px, 80px) scale(0.8);
                opacity: 0;
                background-color: #FF6B6B;
            }
            15% { opacity: 1; }
            50% {
                transform: translate(0px, -60px) scale(1.2);
                background-color: #FFEB3B;
                box-shadow: 0 0 30px #FFEB3B;
            }
            85% { opacity: 1; }
            100% {
                transform: translate(150px, 80px) scale(0.8);
                opacity: 0;
                background-color: #FFA07A;
            }
        }
        .animate-sun {
            animation: sunArc 5s linear infinite;
        }
        .details-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }
        .details-content.open {
            max-height: 1200px;
            transition: max-height 0.5s ease-in;
        }
        .lazy-card {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInCard 0.4s ease forwards;
        }
        @keyframes fadeInCard {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Estilos personalizados para el buscador expandible */
        #search-container {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 36px;
        }
        #search-container.expanded {
            width: 100%;
        }
        @media (min-width: 768px) {
            #search-container.expanded {
                max-width: 320px;
            }
        }
    </style>
</head>
<body class="bg-arena text-slate-800 font-sans min-h-screen pb-24">

    <header class="glass-header sticky top-0 z-50 border-b border-white/40 shadow-sm transition-all">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="app.changeTab('home')">
                <span class="text-2xl">⛺</span>
                <h1 class="text-xl font-black bg-gradient-to-r from-marDark to-teal-500 bg-clip-text text-transparent tracking-tight">CampVibes ES</h1>
            </div>
            
            <div id="telegram-profile-container" class="flex items-center gap-3">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-4">
        
        <div id="view-home" class="space-y-6">
            <section class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-3">
                <div class="flex items-center gap-2 flex-wrap md:flex-nowrap w-full">
                    
                    <div id="search-container" class="relative h-8 bg-slate-50 rounded-xl flex items-center cursor-pointer overflow-hidden border border-transparent focus-within:ring-2 focus-within:ring-marDark" onclick="app.expandSearch()">
                        <div class="w-9 h-8 flex items-center justify-center flex-shrink-0 text-slate-400">
                            <i class="fa-solid fa-magnifying-glass text-xs"></i>
                        </div>
                        <input type="text" id="search-input" oninput="app.filterCampings()" onblur="app.collapseSearch()" placeholder="Buscar camping por nombre, descripción..." class="w-full pr-3 py-1.5 bg-transparent border-none focus:outline-none text-xs hidden opacity-0 transition-opacity duration-200">
                    </div>

                    <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-xl relative">
                        <select id="location-select" onchange="app.onLocationSelectChange(this.value)" class="bg-transparent text-xs font-bold text-slate-600 focus:outline-none cursor-pointer px-2 py-1 max-w-[160px]">
                            <option value="todos">🇪🇸 Toda España</option>
                            <optgroup label="Comunidades Autónomas" id="optgroup-comunidades"></optgroup>
                            <optgroup label="Ciudades / Municipios" id="optgroup-ciudades"></optgroup>
                        </select>
                    </div>
                    
                    <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-xl">
                        <select id="category-select" onchange="app.toggleTypeFilter(this.value)" class="bg-transparent text-xs font-bold text-slate-600 focus:outline-none cursor-pointer px-2 py-1">
                            <option value="todos">☀️ Todos</option>
                            <option value="parcela">🔲 Parcelas</option>
                            <option value="bungalow">🏡 Bungalows</option>
                            <option value="cabana">🪵 Cabañas</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-xl">
                        <select id="environment-select" onchange="app.filterCampings()" class="bg-transparent text-xs font-bold text-slate-600 focus:outline-none cursor-pointer px-2 py-1">
                            <option value="todos">🏞️ Todo Entorno</option>
                            <option value="playa">🏖️ Costa / Playa</option>
                            <option value="montaña">⛰️ Montaña</option>
                        </select>
                    </div>

                    <button onclick="app.toggleFilterModal(true)" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold flex items-center gap-1.5 transition-all">
                        <i class="fa-solid fa-sliders text-xs"></i> Filtrar
                    </button>
                    
                    <button onclick="app.clearFilters()" class="text-marDark hover:underline font-bold text-[11px] ml-auto md:ml-0 px-2">Limpiar</button>
                </div>

                <div id="geo-tg-container" class="border-t border-slate-100 pt-2 flex items-center justify-between flex-wrap gap-2 text-xs">
                    <button id="btn-request-geo" onclick="app.requestTelegramLocation()" class="px-3 py-1.5 bg-sky-50 hover:bg-sky-100 text-sky-600 font-bold rounded-xl transition-all flex items-center gap-1.5 text-[11px]">
                        <i class="fa-brands fa-telegram"></i> Buscar cerca de mí
                    </button>
                    <div id="distance-slider-wrapper" class="hidden flex-1 flex items-center gap-3 bg-slate-50 px-3 py-1.5 rounded-xl min-w-[240px]">
                        <span class="text-slate-500 font-medium whitespace-nowrap text-[11px]">Rango:</span>
                        <input type="range" id="distance-range" min="5" max="500" value="500" oninput="app.onDistanceSliderChange(this.value)" class="w-full accent-marDark h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                        <span id="distance-range-val" class="font-bold text-marDark text-[11px] whitespace-nowrap">500 km</span>
                    </div>
                </div>
            </section>

            <div id="filter-modal" class="fixed inset-0 z-50 glass-modal flex items-center justify-center p-4 hidden">
                <div class="bg-white w-full max-w-md rounded-2xl overflow-hidden shadow-2xl p-5 space-y-4">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                        <h3 class="font-bold text-slate-800 text-sm flex items-center gap-1.5"><i class="fa-solid fa-sliders text-marDark"></i> Filtros Avanzados</h3>
                        <button onclick="app.toggleFilterModal(false)" class="w-6 h-6 flex items-center justify-center bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-full text-xs font-bold">×</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs text-slate-600 max-h-[60vh] overflow-y-auto pr-1">
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-piscina" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🏊 Piscina
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-mascotas" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🐾 Admiten Mascotas
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-wc" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🚾 Baños Premium
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-wifi" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 📶 Conexión WiFi
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-ninos" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 👶 Espacio Niños
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-bar" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🍺 Servicio de Bar
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-tienda" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🛒 Tienda / Súper
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-parque" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🛝 Parque Infantil
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-canchas" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> ⚽ Canchas Deporte
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-animacion" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🎉 Animación Verano
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-oferta" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🏷️ En Oferta
                        </label>
                    </div>
                    <button onclick="app.toggleFilterModal(false)" class="w-full py-2 bg-marDark text-white text-xs font-bold rounded-xl shadow-md shadow-marDark/20">Aplicar Filtros</button>
                </div>
            </div>

            <section>
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🔥</span>
                    <h2 class="text-base font-extrabold text-slate-800 tracking-tight">Joyas del Verano Destacadas</h2>
                </div>
                <div id="featured-carousel" class="flex gap-4 overflow-x-auto pb-2 snap-x scroll-smooth">
                </div>
            </section>

            <section>
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <span class="text-lg">⛺</span>
                        <h2 id="grid-title" class="text-base font-extrabold text-slate-800 tracking-tight">Campings en España</h2>
                    </div>
                    <span id="results-count" class="text-[11px] bg-slate-100 font-bold px-2.5 py-1 rounded-full text-slate-500"></span>
                </div>
                <div id="campings-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
                <div class="flex justify-center mt-8" id="lazy-load-container">
                    <button onclick="app.loadMore()" class="px-6 py-2.5 bg-white text-slate-700 font-bold text-xs rounded-xl shadow-sm border border-slate-200/60 hover:bg-slate-50 active:scale-95 transition-all flex items-center gap-2">
                        Cargar más campings <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </button>
                </div>
            </section>
        </div>

        <div id="view-favorites" class="space-y-6 hidden">
            <div class="flex items-center gap-2 border-b border-slate-200 pb-4">
                <span class="text-2xl text-fomoCoral">❤️</span>
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Tus Campings Guardados</h2>
            </div>
            <div id="favs-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
            <div id="favs-empty-state" class="hidden text-center py-16 space-y-4">
                <span class="text-5xl block">🌊</span>
                <p class="text-slate-500 font-medium">Aún no tienes campings guardados para tus vacaciones.</p>
                <button onclick="app.changeTab('home')" class="px-5 py-2.5 bg-marDark text-white font-bold text-xs rounded-xl shadow-md shadow-marDark/20">Explorar alojamientos</button>
            </div>
            <div class="flex justify-center mt-12 hidden" id="lazy-load-favs-container">
                <button onclick="app.loadMoreFavs()" class="px-8 py-3.5 bg-white text-slate-700 font-bold text-sm rounded-2xl shadow-sm border border-slate-200/60 hover:bg-slate-50 transition-all">
                    Cargar más favoritos
                </button>
            </div>
        </div>
    </main>

    <div id="maps-modal" class="fixed inset-0 z-50 glass-modal flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl flex flex-col relative max-h-[90vh]">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 id="maps-modal-title" class="font-bold text-slate-800 flex items-center gap-2 text-sm"><i class="fa-solid fa-map-location-dot text-marDark"></i> Cómo llegar</h3>
                <button onclick="app.closeMaps()" class="w-8 h-8 flex items-center justify-center bg-slate-200/60 hover:bg-slate-200 text-slate-600 rounded-full text-xs font-bold transition-all">×</button>
            </div>
            <div class="w-full aspect-video bg-slate-100" id="maps-iframe-container">
            </div>
            <div class="p-3 bg-slate-50 border-t border-slate-100 flex gap-2 justify-between items-center flex-wrap">
                <button onclick="app.closeMaps()" class="px-3 py-1.5 bg-rose-100 hover:bg-rose-200 text-rose-700 font-bold text-xs rounded-xl transition-all flex items-center gap-1">
                    <i class="fa-solid fa-xmark"></i> Cerrar mapa
                </button>
                <div class="flex gap-2">
                    <button id="btn-copy-coords" class="px-3 py-1.5 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-xs rounded-xl transition-all flex items-center gap-1">
                        <i class="fa-regular fa-copy"></i> Copiar Dirección
                    </button>
                    <button id="btn-open-gmaps" class="px-3 py-1.5 bg-marDark text-white font-bold text-xs rounded-xl transition-all flex items-center gap-1 shadow-sm">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> Abrir Google Maps
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="booking-modal" class="fixed inset-0 z-50 glass-modal flex flex-col items-center justify-center text-white text-center p-6 hidden">
        <div class="relative w-72 h-44 flex items-center justify-center mb-6">
            <div class="absolute w-14 h-14 rounded-full animate-sun top-6 left-1/2 -ml-7 z-0"></div>
            <svg class="w-32 h-32 z-10 drop-shadow-lg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 80 L50 40 L85 80 Z" fill="#BB86FC" opacity="0.15" />
                <path d="M20 80 L50 45 L80 80 Z" fill="#8D6E63" stroke="#5D4037" stroke-width="3" />
                <path d="M50 45 L15 55 L20 80 L50 45 Z" fill="#A1887F" />
                <path d="M40 80 L40 62 C40 58, 60 58, 60 62 L60 80 Z" fill="#FFE082" stroke="#FFB300" stroke-width="2" />
                <line x1="10" y1="80" x2="90" y2="80" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="space-y-2 max-w-md">
            <h3 class="text-2xl font-black text-mar tracking-wide flex items-center justify-center gap-2">
                Abriendo camping... <i class="fa-solid fa-spinner animate-spin text-sm"></i>
            </h3>
            <p id="booking-random-msg" class="text-slate-200 font-medium text-sm italic tracking-wide px-4"></p>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 h-16 shadow-lg z-50 flex items-center justify-around max-w-7xl mx-auto rounded-t-2xl">
        <button id="tab-btn-home" onclick="app.changeTab('home')" class="flex flex-col items-center justify-center w-1/2 h-full text-marDark font-black transition-all">
            <i class="fa-solid fa-compass text-lg mb-0.5"></i>
            <span class="text-[11px] tracking-wide uppercase">Explorar</span>
        </button>
        <button id="tab-btn-favs" onclick="app.changeTab('favorites')" class="flex flex-col items-center justify-center w-1/2 h-full text-slate-400 font-bold hover:text-fomoCoral transition-all">
            <i class="fa-solid fa-heart text-lg mb-0.5"></i>
            <span class="text-[11px] tracking-wide uppercase">Mis Favoritos</span>
        </button>
    </nav>

                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.Location && typeof Telegram.WebApp.Location.getLocation === 'function') {
                    // API de Telegram Oficial 
                    Telegram.WebApp.Location.getLocation((data) => {

                        }
                    });

            fallbackBrowserLocation() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {

                        () => {

            // Fórmula de Haversine para cálculo exacto de distancias geométricas terrestres
            calculateDistance(lat1, lon1, lat2, lon2) {
                const R = 6371; // Radio de la Tierra en km
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                          Math.sin(dLon / 2) * Math.sin(dLon / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            }

            getFomoCount(id) {
                const today = new Date().toISOString().split('T')[0];
                const seedString = id + today;
                let hash = 0;
                for (let i = 0; i < seedString.length; i++) {
                    hash = seedString.charCodeAt(i) + ((hash << 5) - hash);
                }
                const min = 3;
                const max = 12;
                return Math.abs(hash % (max - min + 1)) + min;
            }

            filterCampings() {
                const searchVal = document.getElementById('search-input').value.toLowerCase();
                const environmentVal = document.getElementById('environment-select').value;
                const checkWc = document.getElementById('filter-wc').checked;
                const checkPiscina = document.getElementById('filter-piscina').checked;
                const checkOferta = document.getElementById('filter-oferta').checked;
                const checkMascotas = document.getElementById('filter-mascotas').checked;
                const checkNinos = document.getElementById('filter-ninos').checked;
                const checkWifi = document.getElementById('filter-wifi').checked;
                const checkBar = document.getElementById('filter-bar').checked;
                const checkTienda = document.getElementById('filter-tienda').checked;
                const checkParque = document.getElementById('filter-parque').checked;
                const checkCanchas = document.getElementById('filter-canchas').checked;
                const checkAnimacion = document.getElementById('filter-animacion').checked;

                let mappedCampings = this.campings.map(camp => {
                    let calculatedDist = null;
                    if (this.userLocation && camp.coordenadas) {
                        const [cLat, cLon] = camp.coordenadas.split(',').map(Number);
                        calculatedDist = this.calculateDistance(this.userLocation.lat, this.userLocation.lon, cLat, cLon);
                    }
                    return { ...camp, _computedDist: calculatedDist };
                });

                this.filteredCampings = mappedCampings.filter(camp => {
                    const matchesText = camp.nombre.toLowerCase().includes(searchVal) || 
                                        camp.desc_corta.toLowerCase().includes(searchVal) ||
                                        camp.ciudad.toLowerCase().includes(searchVal) ||
                                        camp.comunidad.toLowerCase().includes(searchVal);
                    
                    let matchesType = true;
                    if(this.currentTypeFilter !== 'todos') {
                        matchesType = camp.tipos[this.currentTypeFilter] && camp.tipos[this.currentTypeFilter].disponible;
                    }

                    let matchesEnvironment = true;
                    if(environmentVal !== 'todos') {
                        matchesEnvironment = camp.entorno === environmentVal;
                    }

                    // Lógica del filtro avanzado de ubicaciones flotantes (Comunidad / Ciudad)
                    let matchesLocation = true;
                    if (this.currentLocationFilter !== 'todos') {
                        const [locType, locValue] = this.currentLocationFilter.split(':');
                        if (locType === 'comunidad') {
                            matchesLocation = camp.comunidad === locValue;
                        } else if (locType === 'ciudad') {
                            matchesLocation = camp.ciudad === locValue;
                        }
                    }

                    const matchesWc = !checkWc || camp.servicios.includes('wc');
                    const matchesPiscina = !checkPiscina || camp.servicios.includes('piscina');
                    const matchesMascotas = !checkMascotas || camp.servicios.includes('mascotas');
                    const matchesNinos = !checkNinos || camp.servicios.includes('ninos');
                    const matchesWifi = !checkWifi || camp.servicios.includes('wifi');
                    
                    const matchesBar = !checkBar || camp.caracteristicas.bar;
                    const matchesTienda = !checkTienda || camp.caracteristicas.tienda;
                    const matchesParque = !checkParque || camp.caracteristicas.parque;
                    const matchesCanchas = !checkCanchas || camp.caracteristicas.canchas;
                    const matchesAnimacion = !checkAnimacion || camp.caracteristicas.animacion;

                    let matchesOferta = true;
                    if(checkOferta) {
                        matchesOferta = Object.values(camp.tipos).some(t => t.oferta === true);
                    }

                    let matchesDistance = true;
                    if (this.userLocation && camp._computedDist !== null) {
                        matchesDistance = camp._computedDist <= this.maxDistanceFilter;
                    }

                    return matchesText && matchesType && matchesEnvironment && matchesLocation && matchesWc && matchesPiscina && matchesOferta && matchesMascotas && matchesNinos && matchesWifi && matchesBar && matchesTienda && matchesParque && matchesCanchas && matchesAnimacion && matchesDistance;
                });

                // Títulos inteligentes del grid de resultados según filtros aplicados
                if (this.userLocation) {
                    this.filteredCampings.sort((a, b) => (a._computedDist || 0) - (b._computedDist || 0));
                    document.getElementById('grid-title').innerText = "Campings más cercanos a ti";
                } else if (this.currentLocationFilter !== 'todos') {
                    const [_, val] = this.currentLocationFilter.split(':');
                    document.getElementById('grid-title').innerText = `Campings en ${val}`;
                } else {
                    document.getElementById('grid-title').innerText = "Campings en España";
                }

                this.renderGrid();
            }

                carousel.innerHTML = featured.map(camp => `

                        <div class="p-2">
                            <h4 class="font-bold text-slate-800 text-xs truncate">${camp.nombre}</h4>
                            <p class="text-[10px] text-slate-500 flex items-center gap-1">
                                <i class="fa-solid fa-star text-amber-400"></i> ${camp.valoracion} <span class="text-slate-400 font-normal">(${camp.entorno === 'playa' ? '🏖️ Costa' : '⛰️ Montaña'})</span>
                            </p>
                            <p class="text-[9px] text-slate-400 truncate"><i class="fa-solid fa-location-dot"></i> ${camp.ciudad}, ${camp.comunidad}</p>
                        </div>
                    </div>
                `).join('');
            }

            handleTouchStart(e) {
                this.touchStartX = e.touches[0].clientX;
            }

            handleTouchEnd(e, id) {
                const touchEndX = e.changedTouches[0].clientX;
                const diff = this.touchStartX - touchEndX;
                if (Math.abs(diff) > 40) {
                    if (diff > 0) {
                        this.nextImage(id);
                    } else {
                        this.prevImage(id);
                    }
                }
            }

            createCardHTML(camp) {
                const isFav = this.favorites.includes(camp.id);
                const fomoPeople = this.getFomoCount(camp.id);
                
                if (!this.carouselStates[camp.id]) this.carouselStates[camp.id] = 0;
                const activeImgIdx = this.carouselStates[camp.id];

                let pricesHTML = '<div class="flex flex-row gap-1.5 overflow-x-auto justify-between bg-slate-50 p-1.5 rounded-xl border border-slate-100 items-center">';
                Object.keys(camp.tipos).forEach(tipoKey => {
                    const tData = camp.tipos[tipoKey];
                    if(tData.disponible) {
                        let finalPriceHTML = `<span class="font-bold text-slate-800 text-[10px]">${tData.precio}€</span>`;
                        if(tData.oferta) {
                            const descuento = Math.round(((tData.precio - tData.precio_oferta) / tData.precio) * 100);
                            finalPriceHTML = `
                                <div class="flex items-center gap-1">
                                    <span class="line-through text-slate-400 text-[9px]">${tData.precio}€</span>
                                    <span class="font-extrabold text-emerald-500 text-[10px]">${tData.precio_oferta}€</span>
                                    <span class="bg-emerald-100 text-emerald-700 font-bold text-[8px] px-0.5 rounded">-${descuento}%</span>
                                </div>
                            `;
                        }
                        pricesHTML += `
                            <div class="flex flex-col items-center text-[10px] flex-1 min-w-[55px] border-r border-slate-200 last:border-0 px-1">
                                <span class="text-slate-500 font-medium capitalize text-[9px] truncate">
                                    ${tipoKey === 'cabana' ? '🪵' : tipoKey === 'bungalow' ? '🏡' : '🔲'} ${tipoKey}
                                </span>
                                ${finalPriceHTML}
                            </div>
                        `;
                    }
                });
                pricesHTML += '</div>';

                const todosLosServicios = ['piscina', 'mascotas', 'wc', 'wifi', 'ninos'];
                let serviciosTableHTML = `
                    <div class="mt-2 border border-slate-100 rounded-xl overflow-hidden shadow-2xs">
                        <div class="bg-slate-100 px-2 py-1 text-[10px] font-bold text-slate-600 tracking-wider uppercase">Estado de Servicios</div>
                        <table class="w-full text-left text-[11px] bg-white">
                            <tbody>
                `;
                
                todosLosServicios.forEach((serv, idx) => {
                    const tieneServicio = camp.servicios.includes(serv);
                    let label = '';
                    if (serv === 'wc') label = '🚾 Baños Premium';
                    if (serv === 'piscina') label = '🏊 Piscina Cuidada';
                    if (serv === 'wifi') label = '📶 Conexión WiFi';
                    if (serv === 'mascotas') label = '🐾 Admiten Mascotas';
                    if (serv === 'ninos') label = '👶 Espacio Niños';

                    const checkElement = tieneServicio 
                        ? `<span class="text-emerald-500 font-bold flex items-center gap-1"><i class="fa-solid fa-circle-check text-xs"></i> Sí</span>`
                        : `<span class="text-slate-300 font-medium flex items-center gap-1"><i class="fa-solid fa-circle-xmark text-xs"></i> No</span>`;

                    if (idx % 2 === 0) serviciosTableHTML += `<tr>`;
                    serviciosTableHTML += `
                        <td class="p-2 border-b border-slate-100 ${idx % 2 === 0 ? 'border-r' : ''} w-1/2">
                            <div class="flex justify-between items-center gap-1">
                                <span class="text-slate-600 text-[10px] sm:text-[11px]">${label}</span>
                                ${checkElement}
                            </div>
                        </td>
                    `;
                    if (idx % 2 === 1 || idx === todosLosServicios.length - 1) serviciosTableHTML += `</tr>`;
                });
                serviciosTableHTML += `</tbody></table></div>`;

                let caracteristicasTableHTML = `
                    <div class="mt-2 border border-slate-100 rounded-xl overflow-hidden shadow-2xs">
                        <div class="bg-slate-100 px-2 py-1 text-[10px] font-bold text-slate-600 tracking-wider uppercase flex justify-between items-center">
                            <span>Instalaciones y Entorno</span>
                            <span class="text-[9px] bg-marDark text-white px-1.5 py-0.2 rounded-md font-bold uppercase">${camp.entorno === 'playa' ? '🏖️ Costa' : '⛰️ Montaña'}</span>
                        </div>
                        <table class="w-full text-left text-[11px] bg-white">
                            <tbody>
                `;

                const keysCaract = Object.keys(camp.caracteristicas);
                keysCaract.forEach((key, idx) => {
                    const tieneC = camp.caracteristicas[key];
                    let label = '';
                    if(key === 'bar') label = '🍺 Servicio de Bar';
                    if(key === 'tienda') label = '🛒 Tienda / Súper';
                    if(key === 'parque') label = '🛝 Parque Infantil';
                    if(key === 'canchas') label = '⚽ Canchas Deporte';
                    if(key === 'animacion') label = '🎉 Animación Verano';

                    const checkElement = tieneC 
                        ? `<span class="text-emerald-500 font-bold flex items-center gap-1"><i class="fa-solid fa-circle-check text-xs"></i> Sí</span>`
                        : `<span class="text-slate-300 font-medium flex items-center gap-1"><i class="fa-solid fa-circle-xmark text-xs"></i> No</span>`;

                    if (idx % 2 === 0) caracteristicasTableHTML += `<tr>`;
                    caracteristicasTableHTML += `
                        <td class="p-2 border-b border-slate-100 ${idx % 2 === 0 ? 'border-r' : ''} w-1/2">
                            <div class="flex justify-between items-center gap-1">
                                <span class="text-slate-600 text-[10px] sm:text-[11px]">${label}</span>
                                ${checkElement}
                            </div>
                        </td>
                    `;
                    if (idx % 2 === 1 || idx === keysCaract.length - 1) caracteristicasTableHTML += `</tr>`;
                });

                caracteristicasTableHTML += `
                    <tr>
                        <td colspan="2" class="p-2 bg-slate-50/50 text-[11px] font-medium text-slate-700 border-t border-slate-100">
                            <div class="flex flex-col gap-1 text-slate-600">
                                <div class="flex items-center gap-1.5">
                                    ${camp.entorno === 'playa' ? '<i class="fa-solid fa-umbrella-beach text-sky-500"></i>' : '<i class="fa-solid fa-mountain text-amber-600"></i>'}
                                    <span><strong>Localización:</strong> ${camp.distancia}</span>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
                caracteristicasTableHTML += `</tbody></table></div>`;

                // Renderizado hito de distancia calculada en vivo en la tarjeta
                let liveDistanceBadge = '';
                if (camp._computedDist !== null && camp._computedDist !== undefined) {
                    liveDistanceBadge = `
                        <span class="text-[10px] text-sky-600 font-mono font-bold bg-sky-50 px-2 py-0.5 rounded-full whitespace-nowrap">
                            <i class="fa-solid fa-location-arrow text-[8px]"></i> a ${camp._computedDist.toFixed(1)} km
                        </span>
                    `;
                }

                return `
                    <div class="bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-md transition-all duration-300 flex flex-col lazy-card" id="card-${camp.id}">
                        <div class="relative h-52 w-full overflow-hidden group" 
                             ontouchstart="app.handleTouchStart(event)" 
                             ontouchend="app.handleTouchEnd(event, '${camp.id}')">
                            <img src="${camp.imagenes[activeImgIdx]}" id="img-render-${camp.id}" class="w-full h-full object-cover transition-all duration-500 select-none" alt="${camp.nombre}">
                            
                            <button onclick="event.stopPropagation(); app.toggleFavorite('${camp.id}')" class="absolute top-2 right-2 w-8 h-8 rounded-full bg-white/90 flex items-center justify-center shadow-md active:scale-90 transition-all z-20">
                                <i class="${isFav ? 'fa-solid text-fomoCoral' : 'fa-regular text-slate-400'} fa-heart text-xs"></i>
                            </button>

                            <button onclick="event.stopPropagation(); app.prevImage('${camp.id}')" class="absolute left-2 top-1/2 -mt-4 w-7 h-7 rounded-full bg-white/80 flex items-center justify-center text-xs opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-all shadow-sm z-20"><i class="fa-solid fa-chevron-left"></i></button>
                            <button onclick="event.stopPropagation(); app.nextImage('${camp.id}')" class="absolute right-2 top-1/2 -mt-4 w-7 h-7 rounded-full bg-white/80 flex items-center justify-center text-xs opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-all shadow-sm z-20"><i class="fa-solid fa-chevron-right"></i></button>
                            
                            <span class="absolute bottom-2 right-2 bg-black/60 backdrop-blur-sm text-white text-[10px] px-2 py-0.5 rounded-full font-bold tracking-wider z-20">${activeImgIdx + 1} / ${camp.imagenes.length}</span>
                        </div>

                        <div class="p-3 flex-1 flex flex-col space-y-2.5">
                            <div>
                                <div class="flex items-start justify-between gap-1 mb-0.5">
                                    <h3 class="font-extrabold text-slate-800 text-sm leading-snug truncate">${camp.nombre}</h3>
                                    <span onclick="app.orderByBadge('${camp.etiqueta}')" class="text-[8px] font-black tracking-wider px-1.5 py-0.5 rounded cursor-pointer ${this.getTagColorClass(camp.etiqueta)} transform hover:scale-105 transition-all shadow-sm flex-shrink-0">${camp.etiqueta}</span>
                                </div>
                                <div class="flex items-center justify-between flex-wrap gap-1">
                                    <div onclick="app.toggleDetails('${camp.id}')" class="flex items-center gap-1 text-[11px] text-slate-500 font-medium cursor-pointer hover:text-marDark transition-all">
                                        <div class="text-amber-400 flex items-center"><i class="fa-solid fa-star text-[10px]"></i></div>
                                        <span class="text-slate-700 font-bold">${camp.valoracion}</span>
                                        <span class="underline">(${camp.resenas_count} opiniones)</span>
                                    </div>
                                    ${liveDistanceBadge}
                                </div>
                                <div class="text-[11px] text-slate-400 font-semibold mt-1 flex items-center gap-1 flex-wrap">
                                    <i class="fa-solid fa-map-marker-alt text-slate-300"></i> 
                                    <span onclick="app.filterByDirectLocation('ciudad', '${camp.ciudad}')" class="hover:text-marDark cursor-pointer underline transition-colors">${camp.ciudad}</span> 
                                    <span class="text-slate-300 font-normal">(</span>
                                    <span onclick="app.filterByDirectLocation('comunidad', '${camp.comunidad}')" class="hover:text-marDark cursor-pointer underline transition-colors">${camp.comunidad}</span>
                                    <span class="text-slate-300 font-normal">)</span>
                                </div>
                            </div>

                            <p class="text-[11px] text-slate-500 leading-normal line-clamp-2">${camp.desc_corta}</p>

                            <div class="bg-fomoCoral/10 px-2.5 py-1.5 rounded-xl flex items-center gap-1.5 text-fomoCoral font-bold text-[11px] shadow-2xs">
                                <i class="fa-solid fa-heart-pulse text-[10px]"></i>
                                <span>${fomoPeople} usuarios lo añadieron a sus favoritos hoy.</span>
                            </div>

                            ${pricesHTML}

                            <div class="grid grid-cols-2 gap-2 pt-1">
                                <button onclick="app.toggleDetails('${camp.id}')" id="btn-toggle-${camp.id}" class="w-full text-center text-[10px] font-black text-slate-500 hover:text-slate-700 transition-all uppercase tracking-wider flex items-center justify-center gap-1 py-2.5 bg-slate-100 rounded-lg hover:bg-slate-200">
                                    Detalles <i class="fa-solid fa-chevron-down text-[8px]"></i>
                                </button>
                                <button onclick="app.triggerBookingFlow('${camp.id}')" class="w-full py-2.5 bg-gradient-to-r from-marDark to-teal-500 hover:from-blue-600 hover:to-teal-600 text-white font-extrabold text-[11px] rounded-lg shadow-sm active:scale-[0.98] transition-all tracking-wide flex items-center justify-center gap-1">
                                    Reservar <i class="fa-solid fa-umbrella-beach text-[10px]"></i>
                                </button>
                            </div>

                            <div id="details-${camp.id}" class="details-content">
                                <div class="pt-2 pb-1 border-t border-slate-100 mt-1 space-y-2">
                                    <p class="text-[11px] text-slate-500 leading-relaxed bg-slate-50 p-2 rounded-lg mb-1">${camp.desc_larga}</p>
                                    
                                    <div id="extra-buttons-${camp.id}" class="grid grid-cols-2 gap-1.5">
                                        <button onclick="app.openMaps('${camp.nombre}', '${camp.coordenadas}')" class="px-2 py-2 bg-slate-50 hover:bg-slate-100 text-slate-700 font-bold text-[11px] rounded-lg transition-all flex items-center justify-center gap-1 border border-slate-200/60">
                                            <i class="fa-solid fa-map-pin text-marDark text-[10px]"></i> Llegar
                                        </button>
                                        <button onclick="app.handlePhoneAction('${camp.telefono}')" class="px-2 py-2 bg-slate-50 hover:bg-slate-100 text-slate-700 font-bold text-[11px] rounded-lg transition-all flex items-center justify-center gap-1 truncate border border-slate-200/60">
                                            <i class="fa-solid fa-phone text-teal-500 text-[10px]"></i> Llamar
                                        </button>
                                        <a href="${camp.url_web}" target="_blank" class="px-2 py-2 bg-slate-50 hover:bg-slate-100 text-slate-700 font-bold text-[11px] rounded-lg transition-all flex items-center justify-center gap-1 border border-slate-200/60">
                                            <i class="fa-solid fa-globe text-indigo-400 text-[10px]"></i> Web
                                        </a>
                                        <button onclick="app.openTelegramSupport('${camp.id}', '${camp.nombre}')" class="px-2 py-2 bg-sky-50 hover:bg-sky-100 text-sky-600 font-bold text-[11px] rounded-lg transition-all flex items-center justify-center gap-1">
                                            <i class="fa-brands fa-telegram text-xs"></i> Soporte
                                        </button>
                                    </div>

                                    ${serviciosTableHTML}
                                    ${caracteristicasTableHTML}
                                </div>
                            </div>

                        </div>
                    </div>
                `;
            }

            renderGrid() {
                const grid = document.getElementById('campings-grid');
                document.getElementById('results-count').innerText = `${this.filteredCampings.length} campings`;
                
                if (this.filteredCampings.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 font-medium text-xs">No hay campings que coincidan con los filtros o entorno seleccionado 🏖️</div>`;
                    document.getElementById('lazy-load-container').classList.add('hidden');
                    return;
                }

                const slicedData = this.filteredCampings.slice(0, this.homeLimit);
                grid.innerHTML = slicedData.map(camp => this.createCardHTML(camp)).join('');

                const btnContainer = document.getElementById('lazy-load-container');
                if (this.homeLimit >= this.filteredCampings.length) {
                    btnContainer.classList.add('hidden');
                } else {
                    btnContainer.classList.remove('hidden');
                }
            }

            loadMore() {
                this.homeLimit += 5;
                this.renderGrid();
            }

            renderFavorites() {
                const grid = document.getElementById('favs-grid');
                const emptyState = document.getElementById('favs-empty-state');
                const favsData = this.campings.filter(c => this.favorites.includes(c.id));

                if(favsData.length === 0) {
                    grid.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    document.getElementById('lazy-load-favs-container').classList.add('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');
                const slicedFavs = favsData.slice(0, this.favsLimit);
                grid.innerHTML = slicedFavs.map(camp => this.createCardHTML(camp)).join('');

                const btnContainer = document.getElementById('lazy-load-favs-container');
                if (this.favsLimit >= favsData.length) {
                    btnContainer.classList.add('hidden');
                } else {
                    btnContainer.classList.remove('hidden');
                }
            }

            loadMoreFavs() {
                this.favsLimit += 5;
                this.renderFavorites();
            }

            toggleFavorite(id) {
                if (this.favorites.includes(id)) {
                    this.favorites = this.favorites.filter(favId => favId !== id);
                } else {
                    this.favorites.push(id);
                }
                localStorage.setItem('camp_favorites', JSON.stringify(this.favorites));
                this.filterCampings();
                if(this.activeTab === 'favorites') this.renderFavorites();
            }

            nextImage(id) {
                const camp = this.campings.find(c => c.id === id);
                this.carouselStates[id] = (this.carouselStates[id] + 1) % camp.imagenes.length;
                document.getElementById(`img-render-${id}`).src = camp.imagenes[this.carouselStates[id]];
                document.querySelector(`#card-${id} span.bottom-2`).innerText = `${this.carouselStates[id] + 1} / ${camp.imagenes.length}`;
            }

            prevImage(id) {
                const camp = this.campings.find(c => c.id === id);
                this.carouselStates[id] = (this.carouselStates[id] - 1 + camp.imagenes.length) % camp.imagenes.length;
                document.getElementById(`img-render-${id}`).src = camp.imagenes[this.carouselStates[id]];
                document.querySelector(`#card-${id} span.bottom-2`).innerText = `${this.carouselStates[id] + 1} / ${camp.imagenes.length}`;
            }

            toggleDetails(id) {
                const element = document.getElementById(`details-${id}`);
                const btn = document.getElementById(`btn-toggle-${id}`);
                const isOpening = !element.classList.contains('open');
                
                element.classList.toggle('open', isOpening);
                
                btn.innerHTML = isOpening 
                    ? `Ocultar <i class="fa-solid fa-chevron-up text-[8px]"></i>` 
                    : `Detalles <i class="fa-solid fa-chevron-down text-[8px]"></i>`;
            }

            openMaps(nombre, coordenadas) {
                document.getElementById('maps-modal-title').innerHTML = `<i class="fa-solid fa-map-location-dot text-marDark"></i> Cómo llegar a ${nombre}`;
                const container = document.getElementById('maps-iframe-container');
                container.innerHTML = `
                    <iframe class="w-full h-full border-none" src="https://maps.google.com/maps?q=${coordenadas}&z=14&output=embed" allowfullscreen="" loading="lazy"></iframe>
                `;
                
                document.getElementById('btn-copy-coords').onclick = () => {
                    navigator.clipboard.writeText(coordenadas).then(() => {
                        alert("¡Coordenadas copiadas al portapapeles! 📋 (" + coordenadas + ")");
                    });
                };
                
                document.getElementById('btn-open-gmaps').onclick = () => {
                    window.open(`https://www.google.com/maps/search/?api=1&query=${coordenadas}`, '_blank');
                };

                document.getElementById('maps-modal').classList.remove('hidden');
            }

            closeMaps() {
                document.getElementById('maps-modal').classList.add('hidden');
                document.getElementById('maps-iframe-container').innerHTML = '';
            }

            handlePhoneAction(tlf) {
                const action = confirm(`¿Qué deseas hacer con el teléfono (${tlf})?\n\nAceptar: Llamar de inmediato\nCancelar: Copiar al portapapeles`);
                if(action) {
                    window.location.href = `tel:${tlf}`;
                } else {
                    navigator.clipboard.writeText(tlf).then(() => {
                        alert("¡Teléfono copiado con éxito al portapapeles! 📋");
                    });
                }
            }

            openTelegramSupport(id, nombre) {
                const baseText = `Hola! Solicito soporte e información avanzada sobre el camping ${nombre} (ID: ${id}).`;
                const encodedText = encodeURIComponent(baseText);
                window.open(`https://t.me/${TELEGRAM_ADMIN_USERNAME}?text=${encodedText}`, '_blank');
            }

            triggerBookingFlow(id) {
                const camp = this.campings.find(c => c.id === id);
                const modal = document.getElementById('booking-modal');
                const msgTextNode = document.getElementById('booking-random-msg');
                
                const randomMsg = BOOKING_MESSAGES[Math.floor(Math.random() * BOOKING_MESSAGES.length)];
                msgTextNode.innerText = `"${randomMsg}"`;
                
                modal.classList.remove('hidden');

                setTimeout(() => {
                    modal.classList.add('hidden');
                    window.open(camp.url_reservar, '_blank');
                }, 5000);
            }
        }

        const app = new CampVibesApp();
        window.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
