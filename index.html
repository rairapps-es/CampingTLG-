<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampVibes Es - Tu Acampada Veraniega</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        arena: '#FAFAFA',
                        mar: '#00F2FE',
                        marDark: '#4FACFE',
                        naturaleza: '#4CAF50',
                        fomoCoral: '#FF6B6B',
                        fomoSol: '#FFA07A'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-header {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-modal {
            background: rgba(10, 25, 41, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        /* Animación del ciclo del sol sobre la cabaña (5 segundos) */
        @keyframes sunArc {
            0% {
                transform: translate(-150px, 80px) scale(0.8);
                opacity: 0;
                background-color: #FF6B6B;
            }
            15% { opacity: 1; }
            50% {
                transform: translate(0px, -60px) scale(1.2);
                background-color: #FFEB3B;
                box-shadow: 0 0 30px #FFEB3B;
            }
            85% { opacity: 1; }
            100% {
                transform: translate(150px, 80px) scale(0.8);
                opacity: 0;
                background-color: #FFA07A;
            }
        }
        .animate-sun {
            animation: sunArc 5s linear infinite;
        }
        /* Estilos personalizados para transiciones de acordeón */
        .details-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }
        .details-content.open {
            max-height: 1000px;
            transition: max-height 0.5s ease-in;
        }
        /* Lazy load e imágenes */
        .lazy-card {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInCard 0.4s ease forwards;
        }
        @keyframes fadeInCard {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-arena text-slate-800 font-sans min-h-screen pb-12">

    <header class="glass-header sticky top-0 z-50 border-b border-white/40 shadow-sm transition-all">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="app.changeTab('home')">
                <span class="text-2xl">⛺</span>
                <h1 class="text-xl font-black bg-gradient-to-r from-marDark to-teal-500 bg-clip-text text-transparent tracking-tight">CampVibes ES</h1>
            </div>
            
            <nav class="flex items-center gap-6 font-medium text-sm">
                <button id="nav-home" onclick="app.changeTab('home')" class="text-marDark border-b-2 border-marDark pb-1 px-1 transition-all">Explorar</button>
                <button id="nav-favs" onclick="app.changeTab('favorites')" class="text-slate-500 hover:text-fomoCoral pb-1 px-1 transition-all flex items-center gap-1">
                    Favs <i class="fa-solid fa-heart text-xs text-fomoCoral"></i>
                </button>
            </nav>

            <div id="telegram-profile-container" class="flex items-center gap-3">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-4">
        
        <div id="view-home" class="space-y-6">
            <section class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-2 flex-wrap md:flex-nowrap">
                <div class="relative flex-1 min-w-[200px]">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-xs"></i>
                    <input type="text" id="search-input" oninput="app.filterCampings()" placeholder="Buscar camping..." class="w-full pl-8 pr-3 py-1.5 bg-slate-50 rounded-xl border-none focus:outline-none focus:ring-2 focus:ring-marDark text-xs">
                </div>
                
                <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-xl">
                    <select id="category-select" onchange="app.toggleTypeFilter(this.value)" class="bg-transparent text-xs font-bold text-slate-600 focus:outline-none cursor-pointer px-2 py-1">
                        <option value="todos">☀️ Todos</option>
                        <option value="parcela">🔲 Parcelas</option>
                        <option value="bungalow">🏡 Bungalows</option>
                        <option value="cabana">🪵 Cabañas</option>
                    </select>
                </div>

                <button onclick="app.toggleFilterModal(true)" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold flex items-center gap-1.5 transition-all">
                    <i class="fa-solid fa-sliders text-xs"></i> Filtrar
                </button>
                
                <button onclick="app.clearFilters()" class="text-marDark hover:underline font-bold text-[11px] ml-auto md:ml-0 px-2">Limpiar</button>
            </section>

            <div id="filter-modal" class="fixed inset-0 z-50 glass-modal flex items-center justify-center p-4 hidden">
                <div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl p-5 space-y-4">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                        <h3 class="font-bold text-slate-800 text-sm flex items-center gap-1.5"><i class="fa-solid fa-sliders text-marDark"></i> Filtros Avanzados</h3>
                        <button onclick="app.toggleFilterModal(false)" class="w-6 h-6 flex items-center justify-center bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-full text-xs font-bold">×</button>
                    </div>
                    <div class="flex flex-col gap-3 text-xs text-slate-600">
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-wc" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🚾 Baños Premium
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-piscina" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🏊 Piscina
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-oferta" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🏷️ En Oferta
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-mascotas" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 🐾 Acepta Mascotas
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-2.5 rounded-xl hover:bg-slate-100 transition-all">
                            <input type="checkbox" id="filter-ninos" onchange="app.filterCampings()" class="rounded text-marDark focus:ring-marDark w-4 h-4"> 👶 Recomendado para Niños
                        </label>
                    </div>
                    <button onclick="app.toggleFilterModal(false)" class="w-full py-2 bg-marDark text-white text-xs font-bold rounded-xl shadow-md shadow-marDark/20">Aplicar Filtros</button>
                </div>
            </div>

            <section>
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🔥</span>
                    <h2 class="text-base font-extrabold text-slate-800 tracking-tight">Joyas del Verano Destacadas</h2>
                </div>
                <div id="featured-carousel" class="flex gap-4 overflow-x-auto pb-2 snap-x scroll-smooth">
                </div>
            </section>

                    </div>

                </div>

            </div>
        </div>
    </main>

            <div class="w-full aspect-video bg-slate-100" id="maps-iframe-container">
            </div>

                resenas_count: 220,
                tipos: {
                    parcela: { disponible: true, precio: 25, oferta: false },
                    bungalow: { disponible: true, precio: 115, oferta: true, precio_oferta: 99 },
                    cabana: { disponible: true, precio: 130, oferta: false }
                }
            }
        ];

        const BOOKING_MESSAGES = [
            "Los precios más refrescantes del verano.",
            "Los mejores campings de España.",
            "Descubre campings sorprendentes.",
            "Estas vacaciones van a ser refrescantes."
        ];

        const TELEGRAM_ADMIN_USERNAME = "TuUsuarioTelegram";

        class CampVibesApp {
            constructor() {
                this.campings = [...CAMPINGS_DATA];
                this.filteredCampings = [];
                this.favorites = JSON.parse(localStorage.getItem('camp_favorites')) || [];
                this.currentTypeFilter = 'todos';
                this.activeTab = 'home';
                this.homeLimit = 5;
                this.favsLimit = 5;
                this.carouselStates = {};
                this.touchStartX = 0;
            }

            init() {
                this.initTelegramUser();
                this.renderFeaturedCarousel();
                this.filterCampings();
                this.renderFavorites();
            }

            initTelegramUser() {
                let user;
                // Intentar leer de la API oficial de Telegram WebApp si está inyectada en el entorno
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
                    user = window.Telegram.WebApp.initDataUnsafe.user;
                } else {
                    user = JSON.parse(localStorage.getItem('camp_tg_user'));
                }

                if (!user) {
                    user = {
                        id: 77712345,
                        first_name: "Álvaro",
                        username: "veraneante_viajero",
                        photo_url: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80"
                    };
                    localStorage.setItem('camp_tg_user', JSON.stringify(user));
                }

                const container = document.getElementById('telegram-profile-container');
                container.innerHTML = `
                    <div class="flex items-center gap-2 bg-slate-100/80 px-3 py-1.5 rounded-full border border-slate-200/40">
                        <img src="${user.photo_url || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80'}" alt="Avatar" class="w-7 h-7 rounded-full object-cover ring-2 ring-mar">
                        <div class="flex flex-col text-left leading-none">
                            <span class="text-xs font-bold text-slate-800">${user.first_name || 'Usuario'}</span>
                            <span class="text-[10px] text-slate-500">ID: ${user.id || '@' + user.username}</span>
                        </div>
                    </div>
                `;
            }

            changeTab(tab) {
                this.activeTab = tab;
                document.getElementById('view-home').classList.toggle('hidden', tab !== 'home');
                document.getElementById('view-favorites').classList.toggle('hidden', tab !== 'favorites');
                
                if(tab === 'home') {
                    document.getElementById('nav-home').className = "text-marDark border-b-2 border-marDark pb-1 px-1 transition-all";
                    document.getElementById('nav-favs').className = "text-slate-500 hover:text-fomoCoral pb-1 px-1 transition-all flex items-center gap-1";
                } else {
                    document.getElementById('nav-home').className = "text-slate-500 hover:text-marDark pb-1 px-1 transition-all";
                    document.getElementById('nav-favs').className = "text-fomoCoral border-b-2 border-fomoCoral pb-1 px-1 transition-all flex items-center gap-1";
                    this.renderFavorites();
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            toggleFilterModal(show) {
                document.getElementById('filter-modal').classList.toggle('hidden', !show);
            }

            getFomoCount(id) {
                const today = new Date().toISOString().split('T')[0];
                const seedString = id + today;
                let hash = 0;
                for (let i = 0; i < seedString.length; i++) {
                    hash = seedString.charCodeAt(i) + ((hash << 5) - hash);
                }
                const min = 3;
                const max = 12;
                return Math.abs(hash % (max - min + 1)) + min;
            }

            getTagColorClass(tag) {
                switch(tag.toUpperCase()) {
                    case 'DESTACADO': return 'bg-amber-400 text-slate-900';
                    case 'RECOMENDADO': return 'bg-sky-400 text-white';
                    case 'POPULAR': return 'bg-fomoCoral text-white';
                    default: return 'bg-slate-400 text-white';
                }
            }

            toggleTypeFilter(type) {
                this.currentTypeFilter = type;
                document.getElementById('category-select').value = type;
                this.homeLimit = 5;
                this.filterCampings();
            }

            orderByBadge(tag) {
                this.clearFilters();
                this.filteredCampings = this.campings.filter(c => c.etiqueta.toUpperCase() === tag.toUpperCase());
                document.getElementById('grid-title').innerText = `Campings Ordenados por: ${tag}`;
                this.homeLimit = 5;
                this.renderGrid();
            }

            clearFilters() {
                document.getElementById('search-input').value = '';
                document.getElementById('category-select').value = 'todos';
                document.getElementById('filter-wc').checked = false;
                document.getElementById('filter-piscina').checked = false;
                document.getElementById('filter-oferta').checked = false;
                document.getElementById('filter-mascotas').checked = false;
                document.getElementById('filter-ninos').checked = false;
                document.getElementById('grid-title').innerText = "Campings en España";
                this.currentTypeFilter = 'todos';
                this.homeLimit = 5;
                this.filterCampings();
            }

            filterCampings() {
                const searchVal = document.getElementById('search-input').value.toLowerCase();
                const checkWc = document.getElementById('filter-wc').checked;
                const checkPiscina = document.getElementById('filter-piscina').checked;
                const checkOferta = document.getElementById('filter-oferta').checked;
                const checkMascotas = document.getElementById('filter-mascotas').checked;
                const checkNinos = document.getElementById('filter-ninos').checked;

                this.filteredCampings = this.campings.filter(camp => {
                    const matchesText = camp.nombre.toLowerCase().includes(searchVal) || camp.desc_corta.toLowerCase().includes(searchVal);
                    
                    let matchesType = true;
                    if(this.currentTypeFilter !== 'todos') {
                        matchesType = camp.tipos[this.currentTypeFilter] && camp.tipos[this.currentTypeFilter].disponible;
                    }

                    const matchesWc = !checkWc || camp.servicios.includes('wc');
                    const matchesPiscina = !checkPiscina || camp.servicios.includes('piscina');
                    const matchesMascotas = !checkMascotas || camp.servicios.includes('mascotas');
                    const matchesNinos = !checkNinos || camp.servicios.includes('ninos');

                    let matchesOferta = true;
                    if(checkOferta) {
                        matchesOferta = Object.values(camp.tipos).some(t => t.oferta === true);
                    }

                    return matchesText && matchesType && matchesWc && matchesPiscina && matchesOferta && matchesMascotas && matchesNinos;
                });

                this.renderGrid();
            }

            renderFeaturedCarousel() {
                const carousel = document.getElementById('featured-carousel');
                const featured = this.campings.filter(c => c.etiqueta === 'DESTACADO');
                
                carousel.innerHTML = featured.map(camp => `
                    <div class="min-w-[240px] md:min-w-[280px] bg-white rounded-xl overflow-hidden shadow-sm border border-slate-100 snap-start flex-shrink-0 cursor-pointer" onclick="app.orderByBadge('DESTACADO')">
                        <div class="relative h-28">
                            <img src="${camp.imagenes[0]}" class="w-full h-full object-cover" alt="${camp.nombre}">
                            <span class="absolute top-2 left-2 bg-amber-400 text-slate-900 font-extrabold text-[9px] px-2 py-0.5 rounded-md shadow-sm">🔥 ${camp.etiqueta}</span>
                        </div>
                        <div class="p-2">
                            <h4 class="font-bold text-slate-800 text-xs truncate">${camp.nombre}</h4>
                            <p class="text-[10px] text-slate-500 flex items-center gap-1">
                                <i class="fa-solid fa-star text-amber-400"></i> ${camp.valoracion}
                            </p>
                        </div>
                    </div>
                `).join('');
            }

            // CARGA TÁCTIL MÓVIL
            handleTouchStart(e) {
                this.touchStartX = e.touches[0].clientX;
            }

            handleTouchEnd(e, id) {
                const touchEndX = e.changedTouches[0].clientX;
                const diff = this.touchStartX - touchEndX;
                if (Math.abs(diff) > 40) { // Umbral mínimo de swipe
                    if (diff > 0) {
                        this.nextImage(id);
                    } else {
                        this.prevImage(id);
                    }
                }
            }

            createCardHTML(camp) {
                const isFav = this.favorites.includes(camp.id);
                const fomoPeople = this.getFomoCount(camp.id);
                
                if (!this.carouselStates[camp.id]) this.carouselStates[camp.id] = 0;
                const activeImgIdx = this.carouselStates[camp.id];

                // Fila única y súper compacta para tipos y precios
                let pricesHTML = '<div class="flex gap-1.5 overflow-x-auto py-1">';
                Object.keys(camp.tipos).forEach(tipoKey => {
                    const tData = camp.tipos[tipoKey];
                    if(tData.disponible) {
                        let finalPriceHTML = `<span class="font-bold text-slate-700 text-[11px]">${tData.precio}€</span>`;
                        if(tData.oferta) {
                            finalPriceHTML = `<span class="font-extrabold text-emerald-500 text-[11px]">${tData.precio_oferta}€</span>`;
                        }
                        pricesHTML += `
                            <div class="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100 flex-shrink-0 text-[10px]">
                                <span class="text-slate-500 font-medium">${tipoKey === 'cabana' ? '🪵' : tipoKey === 'bungalow' ? '🏡' : '🔲'}</span>
                                ${finalPriceHTML}
                            </div>
                        `;
                    }
                });
                pricesHTML += '</div>';

                const servicesListHTML = camp.servicios.map(s => {
                    let icon = '⛺';
                    if (s === 'wc') icon = '🚾 Baño';
                    if (s === 'piscina') icon = '🏊 Piscina';
                    if (s === 'wifi') icon = '📶 Wifi';
                    if (s === 'mascotas') icon = '🐾 Mascotas';
                    if (s === 'ninos') icon = '👶 Niños';
                    return `<span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-semibold text-[9px] flex items-center gap-1">${icon}</span>`;
                }).join('');

                return `
                    <div class="bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-md transition-all duration-300 flex flex-col lazy-card" id="card-${camp.id}">
                        <div class="relative h-44 w-full overflow-hidden group" 
                             touchstart="app.handleTouchStart(event)" 
                             touchend="app.handleTouchEnd(event, '${camp.id}')">
                            <img src="${camp.imagenes[activeImgIdx]}" id="img-render-${camp.id}" class="w-full h-full object-cover transition-all duration-500" alt="${camp.nombre}">
                            
                            <button onclick="event.stopPropagation(); app.toggleFavorite('${camp.id}')" class="absolute top-2 right-2 w-7 h-7 rounded-full bg-white/90 flex items-center justify-center shadow-md active:scale-90 transition-all z-20">
                                <i class="${isFav ? 'fa-solid text-fomoCoral' : 'fa-regular text-slate-400'} fa-heart text-xs"></i>
                            </button>

                            <button onclick="event.stopPropagation(); app.prevImage('${camp.id}')" class="absolute left-1 top-1/2 -mt-3 w-6 h-6 rounded-full bg-white/70 flex items-center justify-center text-[10px] opacity-0 group-hover:opacity-100 transition-all shadow-sm z-20"><i class="fa-solid fa-chevron-left"></i></button>
                            <button onclick="event.stopPropagation(); app.nextImage('${camp.id}')" class="absolute right-1 top-1/2 -mt-3 w-6 h-6 rounded-full bg-white/70 flex items-center justify-center text-[10px] opacity-0 group-hover:opacity-100 transition-all shadow-sm z-20"><i class="fa-solid fa-chevron-right"></i></button>
                            
                            <span class="absolute bottom-2 right-2 bg-black/50 backdrop-blur-sm text-white text-[9px] px-1.5 py-0.5 rounded font-medium z-20">${activeImgIdx + 1}/5</span>
                        </div>

                        <div class="p-3 flex-1 flex flex-col space-y-2">
                            <div>
                                <div class="flex items-start justify-between gap-1 mb-0.5">
                                    <h3 class="font-extrabold text-slate-800 text-sm leading-snug truncate">${camp.nombre}</h3>
                                    <span onclick="app.orderByBadge('${camp.etiqueta}')" class="text-[8px] font-black tracking-wider px-1.5 py-0.5 rounded cursor-pointer ${this.getTagColorClass(camp.etiqueta)} transform hover:scale-105 transition-all shadow-sm flex-shrink-0">${camp.etiqueta}</span>
                                </div>
                                <div onclick="app.toggleDetails('${camp.id}')" class="flex items-center gap-1 text-[11px] text-slate-500 font-medium cursor-pointer hover:text-marDark transition-all">
                                    <div class="text-amber-400 flex items-center"><i class="fa-solid fa-star text-[10px]"></i></div>
                                    <span class="text-slate-700 font-bold">${camp.valoracion}</span>
                                    <span class="underline">(${camp.resenas_count} opiniones)</span>
                                </div>
                            </div>

                            <p class="text-[11px] text-slate-500 leading-normal line-clamp-2">${camp.desc_corta}</p>

                            <div class="bg-fomoCoral/10 px-2 py-1 rounded-lg flex items-center gap-1 text-fomoCoral font-bold text-[10px]">
                                <i class="fa-solid fa-fire text-[9px]"></i>
                                <span>${fomoPeople} guardados hoy.</span>
                            </div>

                            ${pricesHTML}

                            <div id="details-${camp.id}" class="details-content">
                                <div class="pt-1.5 pb-2 space-y-1.5 border-t border-slate-100 mt-1">
                                    <p class="text-[10px] text-slate-500 leading-relaxed">${camp.desc_larga}</p>
                                    <div class="flex flex-wrap gap-1">${servicesListHTML}</div>
                                </div>
                            </div>

                            <button onclick="app.toggleDetails('${camp.id}')" id="btn-toggle-${camp.id}" class="w-full text-center text-[10px] font-bold text-slate-400 hover:text-slate-600 transition-all flex items-center justify-center gap-1">
                                Ver más <i class="fa-solid fa-chevron-down text-[8px]"></i>
                            </button>

                            <div class="pt-1 grid grid-cols-2 gap-1.5">
                                <button onclick="app.openMaps('${camp.nombre}', '${camp.coordenadas}')" class="px-2 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-[11px] rounded-lg transition-all flex items-center justify-center gap-1">
                                    <i class="fa-solid fa-map-pin text-marDark text-[10px]"></i> Llegar
                                </button>
                                <button onclick="app.handlePhoneAction('${camp.telefono}')" class="px-2 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-[11px] rounded-lg transition-all flex items-center justify-center gap-1 truncate">
                                    <i class="fa-solid fa-phone text-teal-500 text-[10px]"></i> Llamar
                                </button>
                                <a href="${camp.url_web}" target="_blank" class="px-2 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-[11px] rounded-lg transition-all flex items-center justify-center gap-1">
                                    <i class="fa-solid fa-globe text-indigo-400 text-[10px]"></i> Web
                                </a>
                                <button onclick="app.openTelegramSupport('${camp.id}', '${camp.nombre}')" class="px-2 py-2 bg-sky-50 hover:bg-sky-100 text-sky-600 font-bold text-[11px] rounded-lg transition-all flex items-center justify-center gap-1">
                                    <i class="fa-brands fa-telegram text-xs"></i> Soporte
                                </button>
                                <button onclick="app.triggerBookingFlow('${camp.id}')" class="col-span-2 mt-0.5 py-2.5 bg-gradient-to-r from-marDark to-teal-500 hover:from-blue-600 hover:to-teal-600 text-white font-extrabold text-xs rounded-lg shadow-sm active:scale-[0.98] transition-all tracking-wide flex items-center justify-center gap-1.5">
                                    Reservar Alojamiento <i class="fa-solid fa-umbrella-beach text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderGrid() {
                const grid = document.getElementById('campings-grid');
                document.getElementById('results-count').innerText = `${this.filteredCampings.length} campings`;
                
                if (this.filteredCampings.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 font-medium text-xs">No hay campings que coincidan con los filtros 🏖️</div>`;
                    document.getElementById('lazy-load-container').classList.add('hidden');
                    return;
                }

                const slicedData = this.filteredCampings.slice(0, this.homeLimit);
                grid.innerHTML = slicedData.map(camp => this.createCardHTML(camp)).join('');

                const btnContainer = document.getElementById('lazy-load-container');
                if (this.homeLimit >= this.filteredCampings.length) {
                    btnContainer.classList.add('hidden');
                } else {
                    btnContainer.classList.remove('hidden');
                }
            }

            loadMore() {
                this.homeLimit += 5;
                this.renderGrid();
            }

            renderFavorites() {
                const grid = document.getElementById('favs-grid');
                const emptyState = document.getElementById('favs-empty-state');
                const favsData = this.campings.filter(c => this.favorites.includes(c.id));

                if(favsData.length === 0) {
                    grid.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    document.getElementById('lazy-load-favs-container').classList.add('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');
                const slicedFavs = favsData.slice(0, this.favsLimit);
                grid.innerHTML = slicedFavs.map(camp => this.createCardHTML(camp)).join('');

                const btnContainer = document.getElementById('lazy-load-favs-container');
                if (this.favsLimit >= favsData.length) {
                    btnContainer.classList.add('hidden');
                } else {
                    btnContainer.classList.remove('hidden');
                }
            }

            loadMoreFavs() {
                this.favsLimit += 5;
                this.renderFavorites();
            }

            toggleFavorite(id) {
                if (this.favorites.includes(id)) {
                    this.favorites = this.favorites.filter(favId => favId !== id);
                } else {
                    this.favorites.push(id);
                }
                localStorage.setItem('camp_favorites', JSON.stringify(this.favorites));
                this.filterCampings();
                if(this.activeTab === 'favorites') this.renderFavorites();
            }

            nextImage(id) {
                const camp = this.campings.find(c => c.id === id);
                this.carouselStates[id] = (this.carouselStates[id] + 1) % camp.imagenes.length;
                document.getElementById(`img-render-${id}`).src = camp.imagenes[this.carouselStates[id]];
                document.querySelector(`#card-${id} span.bottom-2`).innerText = `${this.carouselStates[id] + 1}/5`;
            }

            prevImage(id) {
                const camp = this.campings.find(c => c.id === id);
                this.carouselStates[id] = (this.carouselStates[id] - 1 + camp.imagenes.length) % camp.imagenes.length;
                document.getElementById(`img-render-${id}`).src = camp.imagenes[this.carouselStates[id]];
                document.querySelector(`#card-${id} span.bottom-2`).innerText = `${this.carouselStates[id] + 1}/5`;
            }

            toggleDetails(id) {
                const element = document.getElementById(`details-${id}`);
                const btn = document.getElementById(`btn-toggle-${id}`);
                const isOpening = !element.classList.contains('open');
                
                element.classList.toggle('open', isOpening);
                btn.innerHTML = isOpening 
                    ? `Ocultar <i class="fa-solid fa-chevron-up text-[8px]"></i>` 
                    : `Ver más <i class="fa-solid fa-chevron-down text-[8px]"></i>`;
            }

            openMaps(nombre, coordenadas) {
                document.getElementById('maps-modal-title').innerHTML = `<i class="fa-solid fa-map-location-dot text-marDark"></i> Cómo llegar a ${nombre}`;
                const container = document.getElementById('maps-iframe-container');
                container.innerHTML = `
                    <iframe class="w-full h-full border-none" src="https://maps.google.com/maps?q=${coordenadas}&z=14&output=embed" allowfullscreen="" loading="lazy"></iframe>
                `;
                
                // Configurar acciones extendidas del modal de mapas
                document.getElementById('btn-copy-coords').onclick = () => {
                    navigator.clipboard.writeText(coordenadas).then(() => {
                        alert("¡Coordenadas copiadas al portapapeles! 📋 (" + coordenadas + ")");
                    });
                };
                
                document.getElementById('btn-open-gmaps').onclick = () => {
                    window.open(`https://www.google.com/maps/search/?api=1&query=${coordenadas}`, '_blank');
                };

                document.getElementById('maps-modal').classList.remove('hidden');
            }

            closeMaps() {
                document.getElementById('maps-modal').classList.add('hidden');
                document.getElementById('maps-iframe-container').innerHTML = '';
            }

            handlePhoneAction(tlf) {
                const action = confirm(`¿Qué deseas hacer con el teléfono (${tlf})?\n\nAceptar: Llamar de inmediato\nCancelar: Copiar al portapapeles`);
                if(action) {
                    window.location.href = `tel:${tlf}`;
                } else {
                    navigator.clipboard.writeText(tlf).then(() => {
                        alert("¡Teléfono copiado con éxito al portapapeles! 📋");
                    });
                }
            }

            openTelegramSupport(id, nombre) {
                const baseText = `Hola! Solicito soporte e información avanzada sobre el camping ${nombre} (ID: ${id}).`;
                const encodedText = encodeURIComponent(baseText);
                window.open(`https://t.me/${TELEGRAM_ADMIN_USERNAME}?text=${encodedText}`, '_blank');
            }

            triggerBookingFlow(id) {
                const camp = this.campings.find(c => c.id === id);
                const modal = document.getElementById('booking-modal');
                const msgTextNode = document.getElementById('booking-random-msg');
                
                const randomMsg = BOOKING_MESSAGES[Math.floor(Math.random() * BOOKING_MESSAGES.length)];
                msgTextNode.innerText = `"${randomMsg}"`;
                
                modal.classList.remove('hidden');

                setTimeout(() => {
                    modal.classList.add('hidden');
                    window.open(camp.url_reservar, '_blank');
                }, 5000);
            }
        }

        const app = new CampVibesApp();
        window.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
